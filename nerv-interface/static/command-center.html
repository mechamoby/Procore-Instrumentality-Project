function closeRadarForm() {
    const overlay = document.getElementById('radar-form-overlay');
    if (overlay) overlay.remove();
    document.removeEventListener('keydown', radarFormKeyHandler);
}

function selectPriority(btn) {
    btn.parentElement.querySelectorAll('.rf-priority-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
}

function toggleScope(chip) {
    const grid = chip.parentElement;
    const isEverything = chip.dataset.scope === 'everything';
    const individuals = grid.querySelectorAll('.rf-scope-chip:not(.everything)');
    const everythingChip = grid.querySelector('.rf-scope-chip.everything');

    if (isEverything) {
        const wasActive = chip.classList.contains('active');
        individuals.forEach(c => c.classList.remove('active'));
        chip.classList.toggle('active', !wasActive);
    } else {
        everythingChip.classList.remove('active');
        chip.classList.toggle('active');
        // Auto-collapse to "Everything" if all 5 are active
        const activeCount = grid.querySelectorAll('.rf-scope-chip.active:not(.everything)').length;
        if (activeCount === 5) {
            individuals.forEach(c => c.classList.remove('active'));
            everythingChip.classList.add('active');
        }
    }
}

async function submitRadarForm() {
    const btn = document.getElementById('rf-submit-btn');
    const titleEl = document.getElementById('rf-title');
    const projectEl = document.getElementById('rf-project');

    // Validation
    let valid = true;
    if (!titleEl.value.trim()) { titleEl.classList.add('rf-invalid'); valid = false; setTimeout(() => titleEl.classList.remove('rf-invalid'), 3000); }
    if (!projectEl.value || projectEl.value === '') { projectEl.classList.add('rf-invalid'); valid = false; setTimeout(() => projectEl.classList.remove('rf-invalid'), 3000); }
    if (!valid) return;

    // Gather scope
    const scopeChips = document.querySelectorAll('.rf-scope-chip.active');
    let scope = [];
    if (document.querySelector('.rf-scope-chip.everything.active')) {
        scope = ['rfis', 'submittals', 'daily_logs', 'schedule', 'change_orders'];
    } else {
        scopeChips.forEach(c => scope.push(c.dataset.scope));
    }

    // Priority
    const priorityBtn = document.querySelector('.rf-priority-btn.active');
    const priority = priorityBtn ? priorityBtn.dataset.priority : 'watch';

    // Project — handle cross-project and pre-selected
    let projectId = projectEl.value;
    if (projectId === 'cross-project') projectId = state.projects[0]?.id || '';

    const body = {
        title: titleEl.value.trim(),
        project_id: projectId,
        priority: priority,
        description: document.getElementById('rf-description').value.trim(),
        primary_target: document.getElementById('rf-target').value.trim() || titleEl.value.trim(),
        monitoring_scope: { keywords: [], entity_types: scope },
    };

    btn.innerHTML = 'Adding...';
    btn.style.opacity = '0.7';
    btn.disabled = true;

    try {
        const res = await fetch(API_BASE + '/radar/items', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(body),
            credentials: 'same-origin',
        });

        if (res.ok) {
            btn.innerHTML = '&#10003; Added to radar';
            btn.classList.add('success');
            btn.style.opacity = '1';
            setTimeout(() => {
                closeRadarForm();
                renderRadarSidebar();
                if (state.view === 'radar') render();
            }, 1500);
        } else {
            throw new Error('Failed');
        }
    } catch (err) {
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg> Add to radar`;
        btn.style.opacity = '1';
        btn.disabled = false;
        const errorToast = document.getElementById('rf-error-toast');
        if (errorToast) {
            errorToast.textContent = 'Failed to add item — try again';
            errorToast.style.display = 'block';
            setTimeout(() => { errorToast.style.display = 'none'; }, 4000);
        }
    }
}

function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function timeAgo(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    return days + 'd ago';
}

async function runSynthesis() {
    const btn = document.getElementById('synthesis-btn');
    if (!btn) return;

    // Use selected project, or all active projects from dashboard
    const pid = state.selectedProjectId || (state.projects[0]?.id);
    if (!pid) { alert('No project available'); return; }

    // If on dashboard with multiple projects, run sweep first for all projects
    if (state.view === 'dashboard' && state.projects.length > 1) {
        for (const p of state.projects) {
            try { await fetch(`${API_BASE}/synthesis/sweep?project_id=${p.id}`, { method: 'POST', credentials: 'same-origin' }); } catch(e) {}
        }
    }

    btn.disabled = true;
    btn.textContent = 'Running analysis...';
    btn.style.opacity = '0.7';

    try {
        const res = await fetch(`${API_BASE}/synthesis/trigger?project_id=${pid}&cycle_type=morning_briefing`, { method: 'POST', credentials: 'same-origin' });
        const data = await res.json();
        const jobId = data.job_id;

        // Poll for completion
        let attempts = 0;
        const poll = setInterval(async () => {
            attempts++;
            const status = await api(`/synthesis/status/${jobId}`);
            if (status?.status === 'completed') {
                clearInterval(poll);
                btn.textContent = 'Analysis complete!';
                btn.style.background = 'var(--accent-green)';
                btn.style.color = 'var(--navy)';
                setTimeout(() => {
                    btn.textContent = 'Run Analysis';
                    btn.style.background = 'var(--steel-blue)';
                    btn.style.color = 'white';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                    render(); // Refresh dashboard
                }, 2000);
            } else if (status?.status === 'failed' || attempts > 60) {
                clearInterval(poll);
                btn.textContent = 'Analysis failed';
                btn.style.background = 'var(--accent-red)';
                setTimeout(() => {
                    btn.textContent = 'Run Analysis';
                    btn.style.background = 'var(--steel-blue)';
                    btn.style.color = 'white';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }, 3000);
            } else {
                btn.textContent = `Analyzing... (${attempts}s)`;
            }
        }, 1000);

    } catch (err) {
        console.error('Synthesis trigger failed:', err);
        btn.textContent = 'Run Analysis';
        btn.style.opacity = '1';
        btn.disabled = false;
    }
}

async function runSignalSweep() {
    const btn = document.getElementById('sweep-btn');

    const pid = state.selectedProjectId || (state.projects[0]?.id);

        btn.disabled = false;
    }
}

// HEALTH SORT
// =============================================================================
function sortProjectsByHealth(projects) {
    const healthOrder = { red: 0, yellow: 1, green: 2, unknown: 3 };
    return [...projects].sort((a, b) => {
        // Critical items first
        const aCrit = a.intelligence?.critical || 0;
        const bCrit = b.intelligence?.critical || 0;
        if (aCrit !== bCrit) return bCrit - aCrit;
        // Then by health status
        const aHealth = a.last_synthesis?.overall_health || 'unknown';
        const bHealth = b.last_synthesis?.overall_health || 'unknown';
        if (healthOrder[aHealth] !== healthOrder[bHealth]) return healthOrder[aHealth] - healthOrder[bHealth];
        // Then alphabetical
        return (a.name || '').localeCompare(b.name || '');
    });
}

async function loadActivityFeed() {
    const feedList = document.getElementById('activity-feed-list');
    if (!feedList) return;

    // Try unified activity endpoint first, then signals/recent, then per-project fallback
    let activities = [];
    const activityRes = await api('/activity/recent?limit=30');
    if (activityRes?.data) {
        activities = activityRes.data;
    } else {
        const recentRes = await api('/signals/recent?limit=20');
        if (recentRes?.data) {
            activities = recentRes.data;
        } else {
            for (const p of state.projects) {
                const res = await api(`/projects/${p.id}/signals?limit=10`);
                if (res?.data) {
                    activities.push(...res.data.map(s => ({ ...s, project_name: p.name })));
                }
            }
            activities.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            activities = activities.slice(0, 20);
        }
    }

    if (activities.length === 0) {
        feedList.innerHTML = '<div style="padding:16px; text-align:center; color:var(--text-muted); font-size:13px;">No recent activity.</div>';
        return;
    }

    feedList.innerHTML = activities.map(a => {
        const isCritical = a.is_critical || a.signal_category === 'contradiction' || (a.effective_weight && a.effective_weight > 0.8);
        const projName = a.project_name || findProjectName(a.project_id);
        const person = a.person || '';
        // Parse server time directly (avoid browser timezone conversion)
        const timeStr = formatServerTime(a.created_at);
        const url = a.procore_url || '';
        const clickable = url ? `onclick="window.open('${esc(url)}', '_blank')" style="cursor:pointer;"` : '';
        return `
            <div class="activity-entry" ${clickable}>
                ${isCritical ? '<div class="activity-critical-dot"></div>' : '<div style="width:6px;flex-shrink:0;"></div>'}
                <div class="activity-time">${timeStr}</div>
                <div class="activity-desc" ${url ? 'style="color:var(--text-primary);"' : ''}>${esc(a.summary || '').substring(0, 120)}</div>
                ${person ? `<div style="font-size:11px; color:var(--text-muted); white-space:nowrap; min-width:90px; text-align:right;">${esc(person)}</div>` : '<div style="min-width:90px;"></div>'}
                ${projName ? `<div class="activity-project-pill">${esc(projName)}</div>` : '<div style="min-width:80px;"></div>'}
            </div>
        `;
    }).join('');
}

function formatServerTime(isoStr) {
    // Extract time directly from ISO string to avoid browser timezone conversion
    // Format: 2026-03-13T23:07:27.571517-04:00
    if (!isoStr) return '';
    const match = isoStr.match(/T(\d{2}):(\d{2})/);
    if (!match) return '';
    let h = parseInt(match[1], 10);
    const m = match[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return `${h}:${m} ${ampm}`;
}

function findProjectName(projectId) {
    if (!projectId) return '';
    const p = state.projects.find(p => p.id === projectId);
    return p?.name || '';
}

async function submitDeepDive() {
    const btn = document.getElementById('dd-submit-btn');

    if (_ddMode === 'open') {
        // Validate
        let valid = true;
        const projectEl = document.getElementById('dd-project');
        const subjectEl = document.getElementById('dd-subject');
        const concernEl = document.getElementById('dd-concern');

        if (!projectEl?.value) { projectEl.classList.add('rf-invalid'); valid = false; setTimeout(() => projectEl.classList.remove('rf-invalid'), 3000); }
        if (!subjectEl?.value) { subjectEl.classList.add('rf-invalid'); valid = false; setTimeout(() => subjectEl.classList.remove('rf-invalid'), 3000); }
        if (subjectEl?.value === 'something_else' && !concernEl?.value?.trim()) {
            concernEl.classList.add('rf-invalid'); valid = false; setTimeout(() => concernEl.classList.remove('rf-invalid'), 3000);
        }
        if (!valid) return;
    }

    // Gather focus areas
    const focusAreas = [];
    document.querySelectorAll('#dd-body .rf-scope-chip.active').forEach(c => focusAreas.push(c.dataset.focus));

    // Build payload
    const payload = {
        trigger_type: _ddMode === 'linked' ? 'user_item_linked' : 'user_open',
        project_id: _ddMode === 'linked'
            ? (_ddLinkedItem?.project_id || state.selectedProjectId)
            : document.getElementById('dd-project')?.value,
        linked_item_id: _ddMode === 'linked'
            ? (_ddLinkedItem?.id || null)
            : (document.getElementById('dd-subject')?.value !== 'something_else' ? document.getElementById('dd-subject')?.value : null),
        concern_description: _ddMode === 'open' ? (document.getElementById('dd-concern')?.value?.trim() || null) : null,
        focus_areas: focusAreas,
        additional_context: document.getElementById('dd-context')?.value?.trim() || null,
        focus_steering: _ddMode === 'linked' ? (document.getElementById('dd-steering')?.value?.trim() || null) : null,
    };

    btn.innerHTML = 'Submitting...';
    btn.style.opacity = '0.7';
    btn.disabled = true;

    try {
        console.log('[Deep Dive] POST /api/deep-dive/requests', payload);
        const res = await fetch(API_BASE + '/deep-dive/requests', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload),
            credentials: 'same-origin',
        });
        if (res.status === 429) {
            throw new Error("You've reached today's analysis limit. Your next request will be available tomorrow.");
        }
        if (!res.ok && res.status !== 404) throw new Error('Request failed');
        // 404 = endpoint doesn't exist yet — still show success for demo
        if (res.status === 404) console.log('[Deep Dive] POST returned 404 — endpoint not built yet, showing success for demo');
    } catch (err) {
        console.log('[Deep Dive] POST failed:', err.message);
        if (err.message.includes('limit')) {
            btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg> Request analysis`;
            btn.style.opacity = '1';
            btn.disabled = false;
            showToast(err.message);
            return;
        }
    }

    // Success state (including 404 for demo)
    btn.innerHTML = '&#10003; Analysis requested';
    btn.classList.add('success');
    btn.style.opacity = '1';
    setTimeout(() => closeDeepDive(), 2000);
}

                <input class="search-input" id="search-input" type="text"
                    placeholder="Search RFIs, submittals, contacts, intelligence..."
                    autocomplete="off" autofocus>
                <span class="search-hint">ESC to close</span>
            </div>
            <div class="search-results" id="search-results">
                <div class="search-empty">
                    <div style="font-size:24px; margin-bottom:8px; opacity:0.4;">&#128269;</div>
                    Search across all projects — RFIs, submittals, intelligence items, contacts
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);

    const input = document.getElementById('search-input');
    input.focus();
    input.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const q = e.target.value.trim();
        if (q.length < 2) {
            document.getElementById('search-results').innerHTML = `
                <div class="search-empty">
                    <div style="font-size:24px; margin-bottom:8px; opacity:0.4;">&#128269;</div>
                    Search across all projects — RFIs, submittals, intelligence items, contacts
                </div>`;
            return;
        }
        document.getElementById('search-results').innerHTML = '<div class="search-loading"><div class="spinner" style="display:inline-block;margin-right:8px;"></div>Searching...</div>';
        searchTimeout = setTimeout(() => runSearch(q), 300);
    });

    // ESC to close
    document.addEventListener('keydown', searchKeyHandler);
}

function searchKeyHandler(e) {
    if (e.key === 'Escape') closeSearch();
}

function closeSearch() {
    const overlay = document.getElementById('search-overlay');
    if (overlay) overlay.remove();
    document.removeEventListener('keydown', searchKeyHandler);
}

async function runSearch(query) {
    const res = await api(`/search?q=${encodeURIComponent(query)}&limit=10`);
    const container = document.getElementById('search-results');
    if (!container) return;

    if (!res || res.total === 0) {
        container.innerHTML = `<div class="search-empty">No results for "${esc(query)}"</div>`;
        return;
    }

    const d = res.data;
    let html = '';

    // RFIs
    if (d.rfis?.length) {
        html += '<div class="search-group-label">RFIs</div>';
        html += d.rfis.map(r => {
            const statusBadge = r.is_overdue ? '<span style="color:var(--accent-red); font-size:10px; font-weight:600;">OVERDUE</span>' : r.status;
            const click = r.procore_url ? `onclick="window.open('${esc(r.procore_url)}', '_blank')"` : '';
            return `<div class="search-result-item" ${click}>
                <div class="sri-icon rfi">RFI</div>
                <div class="sri-body">
                    <div class="sri-title">#${esc(r.number)} — ${esc(r.subject)}</div>
                    <div class="sri-meta">${statusBadge}${r.due_date ? ' · Due ' + r.due_date : ''}</div>
                </div>
                <div class="sri-project">${esc(r.project_name || '')}</div>
            </div>`;
        }).join('');
    }

    // Submittals
    if (d.submittals?.length) {
        html += '<div class="search-group-label">Submittals</div>';
        html += d.submittals.map(s => {
            const click = s.procore_url ? `onclick="window.open('${esc(s.procore_url)}', '_blank')"` : '';
            return `<div class="search-result-item" ${click}>
                <div class="sri-icon sub">SUB</div>
                <div class="sri-body">
                    <div class="sri-title">#${esc(s.number)} — ${esc(s.title)}</div>
                    <div class="sri-meta">${esc(s.status || '')}${s.required_date ? ' · Required ' + s.required_date : ''}</div>
                </div>
                <div class="sri-project">${esc(s.project_name || '')}</div>
            </div>`;
        }).join('');
    }

    // Intelligence items
    if (d.intelligence_items?.length) {
        html += '<div class="search-group-label">Intelligence</div>';
        html += d.intelligence_items.map(i => {
            const sevColor = i.severity === 'critical' ? 'var(--accent-red)' : i.severity === 'high' ? 'var(--accent-amber)' : 'var(--accent-blue)';
            return `<div class="search-result-item" onclick="closeSearch(); selectProject('${i.project_id || ''}')">
                <div class="sri-icon intel" style="color:${sevColor};">!</div>
                <div class="sri-body">
                    <div class="sri-title">${esc(i.title)}</div>
                    <div class="sri-meta">${esc(i.severity || '')} · ${esc(i.item_type || '')} · ${i.confidence ? Math.round(i.confidence * 100) + '% confidence' : ''}</div>
                </div>
                <div class="sri-project">${esc(i.project_name || '')}</div>
            </div>`;
        }).join('');
    }

    // Signals
    if (d.signals?.length) {
        html += '<div class="search-group-label">Signals</div>';
        html += d.signals.map(s => `
            <div class="search-result-item">
                <div class="sri-icon signal">S</div>
                <div class="sri-body">
                    <div class="sri-title">${esc(s.summary)}</div>
                    <div class="sri-meta">${esc(s.signal_category || '')} · ${formatServerTime(s.created_at)}</div>
                </div>
                <div class="sri-project">${esc(s.project_name || '')}</div>
            </div>
        `).join('');
    }

    // Contacts
    if (d.contacts?.length) {
        html += '<div class="search-group-label">Contacts</div>';
        html += d.contacts.map(c => `
            <div class="search-result-item">
                <div class="sri-icon contact">${esc((c.first_name || '')[0] || '')}${esc((c.last_name || '')[0] || '')}</div>
                <div class="sri-body">
                    <div class="sri-title">${esc(c.first_name || '')} ${esc(c.last_name || '')}</div>
                    <div class="sri-meta">${esc(c.title || '')}${c.company_name ? ' · ' + esc(c.company_name) : ''}${c.email ? ' · ' + esc(c.email) : ''}</div>
                </div>
            </div>
        `).join('');
    }

    container.innerHTML = html;
}

function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// =============================================================================
// INIT
// =============================================================================
async function init() {
    // Set topbar date/time
    updateTopbarDateTime();
    setInterval(updateTopbarDateTime, 60000);

    // Parse URL to restore view state
    const path = window.location.pathname;
    const projectMatch = path.match(/\/project\/([^/]+)/);
    if (projectMatch) {
        state.view = 'project';
        state.selectedProjectId = projectMatch[1];
    } else if (path === '/radar' || path.startsWith('/radar')) {
        state.view = 'radar';
    } else {
        state.view = 'dashboard';
    }

    // Handle browser back/forward
    window.addEventListener('popstate', (e) => {
        if (e.state) {
            navigate(e.state.view || 'dashboard', e.state.projectId, true);
        } else {
            navigate('dashboard', null, true);
        }
    });

    // Load sidebar first
    await loadSidebar();
    // Render current view (from URL or dashboard)
    await render();
    // Refresh sidebar with health data now that dashboard is loaded
    await loadSidebar();

    // Update sync indicator
    const healthRes = await api('/health');
    const syncDot = document.getElementById('sync-dot');
    if (healthRes?.status === 'healthy') {
        syncDot.style.background = 'var(--accent-green)';
    } else {
        syncDot.style.background = 'var(--accent-red)';
    }

    // Auto-refresh activity feed every 30 seconds when on dashboard
    setInterval(() => {
        if (state.view === 'dashboard') loadActivityFeed();
    }, 30000);
}

function updateTopbarDateTime() {
    const el = document.getElementById('topbar-datetime');
    if (!el) return;
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    el.innerHTML = `${dateStr}<br><span style="font-size:11px;">${timeStr}</span>`;
    el.style.textAlign = 'right';
    el.style.lineHeight = '1.3';
}

init();
</script>
