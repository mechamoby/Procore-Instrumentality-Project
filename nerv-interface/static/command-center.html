async function renderRadarSidebar() {
    const sidebar = document.getElementById('radar-sidebar');
    if (!sidebar) return;

    // Hide on full Radar view
    if (state.view === 'radar') {
        sidebar.style.display = 'none';
        return;
    }
    sidebar.style.display = '';

    // Fetch radar items
    const res = await api('/radar/items?limit=20');
    const allItems = res?.data || [];

    // Filter by project if on project detail
    let items = allItems;
    const showProjectName = state.view !== 'project';
    if (state.view === 'project' && state.selectedProjectId) {
        items = allItems.filter(i => i.project_id === state.selectedProjectId);
    }

    sidebar.innerHTML = `
        <div class="radar-sidebar-header">Radar <button class="radar-toggle" onclick="toggleSidebar('radar')" title="Collapse Radar">&#9654;</button></div>
        ${items.length === 0 ? `
            <div class="radar-sidebar-empty">No active Radar items${state.view === 'project' ? ' for this project' : ''}.</div>
        ` : items.map(item => {
            const sevClass = item.priority === 'critical' ? 'sev-critical' : item.priority === 'high' ? 'sev-high' : 'sev-watch';
            const sevLabelClass = item.priority === 'critical' ? 'critical' : item.priority === 'high' ? 'high' : 'watch';
            // Determine trend from activity or default to stable
            const trend = item.trend || 'stable';
            let trendText = '→ Stable', trendColor = 'var(--text-muted)';
            if (trend === 'escalating') { trendText = '↑ Escalating'; trendColor = 'var(--accent-red)'; }
            else if (trend === 'improving') { trendText = '↓ Improving'; trendColor = 'var(--accent-green)'; }
            const projName = showProjectName ? (item.project_name || findProjectName(item.project_id)) : '';
            return `
                <div class="radar-sidebar-item ${sevClass}" onclick="viewRadarItem('${item.id}')">
                    <div class="rsi-title">${esc(item.title)}</div>
                    ${projName ? `<div class="rsi-project">${esc(projName)}</div>` : ''}
                    <div class="rsi-meta">
                        <span class="rsi-severity ${sevLabelClass}">${item.priority}</span>
                        <span style="color:var(--text-muted);">·</span>
                        <span style="color:${trendColor};">${trendText}</span>
                    </div>
                </div>
            `;
        }).join('')}
    `;
}

function filterProjectDropdown(query) {
    const items = document.querySelectorAll('#nav-pd-list .nav-pd-item');

function timeAgo(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    const days = Math.floor(hrs / 24);
    return days + 'd ago';
}

async function runSynthesis() {
    const btn = document.getElementById('synthesis-btn');
    if (!btn) return;

    // Use selected project, or all active projects from dashboard
    const pid = state.selectedProjectId || (state.projects[0]?.id);
    if (!pid) { alert('No project available'); return; }

    // If on dashboard with multiple projects, run sweep first for all projects
    if (state.view === 'dashboard' && state.projects.length > 1) {
        for (const p of state.projects) {
            try { await fetch(`${API_BASE}/synthesis/sweep?project_id=${p.id}`, { method: 'POST', credentials: 'same-origin' }); } catch(e) {}
        }
    }

    btn.disabled = true;
    btn.textContent = 'Running analysis...';
    btn.style.opacity = '0.7';

    try {
        const res = await fetch(`${API_BASE}/synthesis/trigger?project_id=${pid}&cycle_type=morning_briefing`, { method: 'POST', credentials: 'same-origin' });
        const data = await res.json();
        const jobId = data.job_id;

        // Poll for completion
        let attempts = 0;
        const poll = setInterval(async () => {
            attempts++;
            const status = await api(`/synthesis/status/${jobId}`);
            if (status?.status === 'completed') {
                clearInterval(poll);
                btn.textContent = 'Analysis complete!';
                btn.style.background = 'var(--accent-green)';
                btn.style.color = 'var(--navy)';
                setTimeout(() => {
                    btn.textContent = 'Run Analysis';
                    btn.style.background = 'var(--steel-blue)';
                    btn.style.color = 'white';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                    render(); // Refresh dashboard
                }, 2000);
            } else if (status?.status === 'failed' || attempts > 60) {
                clearInterval(poll);
                btn.textContent = 'Analysis failed';
                btn.style.background = 'var(--accent-red)';
                setTimeout(() => {
                    btn.textContent = 'Run Analysis';
                    btn.style.background = 'var(--steel-blue)';
                    btn.style.color = 'white';
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }, 3000);
            } else {
                btn.textContent = `Analyzing... (${attempts}s)`;
            }
        }, 1000);

    } catch (err) {
        console.error('Synthesis trigger failed:', err);
        btn.textContent = 'Run Analysis';
        btn.style.opacity = '1';
        btn.disabled = false;
    }
}

async function runSignalSweep() {
    const btn = document.getElementById('sweep-btn');
    if (!btn) return;

    const pid = state.selectedProjectId || (state.projects[0]?.id);
    if (!pid) { alert('No project available'); return; }

    }
}

// =============================================================================
function sortProjectsByHealth(projects) {
    const healthOrder = { red: 0, yellow: 1, green: 2, unknown: 3 };
    return [...projects].sort((a, b) => {
        // Critical items first
        const aCrit = a.intelligence?.critical || 0;
        const bCrit = b.intelligence?.critical || 0;
        if (aCrit !== bCrit) return bCrit - aCrit;
        // Then by health status
        const aHealth = a.last_synthesis?.overall_health || 'unknown';
        const bHealth = b.last_synthesis?.overall_health || 'unknown';
        if (healthOrder[aHealth] !== healthOrder[bHealth]) return healthOrder[aHealth] - healthOrder[bHealth];
        // Then alphabetical
        return (a.name || '').localeCompare(b.name || '');
    });
}

async function loadActivityFeed() {
    const feedList = document.getElementById('activity-feed-list');
    if (!feedList) return;

    // Try unified activity endpoint first, then signals/recent, then per-project fallback
    let activities = [];
    const activityRes = await api('/activity/recent?limit=30');
    if (activityRes?.data) {
        activities = activityRes.data;
    } else {
        const recentRes = await api('/signals/recent?limit=20');
        if (recentRes?.data) {
            activities = recentRes.data;
        } else {
            for (const p of state.projects) {
                const res = await api(`/projects/${p.id}/signals?limit=10`);
                if (res?.data) {
                    activities.push(...res.data.map(s => ({ ...s, project_name: p.name })));
                }
            }
            activities.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            activities = activities.slice(0, 20);
        }
    }

    if (activities.length === 0) {
        feedList.innerHTML = '<div style="padding:16px; text-align:center; color:var(--text-muted); font-size:13px;">No recent activity.</div>';
        return;
    }

    feedList.innerHTML = activities.map(a => {
        const isCritical = a.is_critical || a.signal_category === 'contradiction' || (a.effective_weight && a.effective_weight > 0.8);
        const projName = a.project_name || findProjectName(a.project_id);
        const person = a.person || '';
        const timeStr = formatServerTime(a.created_at);
        const url = a.procore_url || (a.document_id ? '/api/documents/' + a.document_id + '/view' : '');
        const clickable = url ? `onclick="window.open('${esc(url)}', '_blank')" style="cursor:pointer;"` : '';
        const emailSubject = encodeURIComponent((projName ? projName + ' – ' : '') + (a.summary || '').substring(0, 100));
        const procoreLink = a.procore_url ? '\n\nView in Procore: ' + a.procore_url : '';
        const emailBody = encodeURIComponent((a.summary || '') + procoreLink + '\n\nPlease advise.\n\nThank you.');
        const mailto = 'mailto:?subject=' + emailSubject + '&body=' + emailBody;
        return `
            <div class="activity-entry" ${clickable}>
                ${isCritical ? '<div class="activity-critical-dot"></div>' : '<div style="width:6px;flex-shrink:0;"></div>'}
                <div class="activity-time">${timeStr}</div>
                <div class="activity-desc" ${url ? 'style="color:var(--text-primary);"' : ''}>${esc(a.summary || '').substring(0, 120)}</div>
                ${person ? `<div style="font-size:11px; color:var(--text-muted); white-space:nowrap; min-width:90px; text-align:right;">${esc(person)}</div>` : '<div style="min-width:90px;"></div>'}
                ${projName ? `<div class="activity-project-pill">${esc(projName)}</div>` : '<div style="min-width:80px;"></div>'}
                <a href="${mailto}" onclick="event.stopPropagation();" title="Compose email about this item" style="flex-shrink:0;color:rgba(255,255,255,0.25);font-size:13px;text-decoration:none;padding:2px 4px;transition:color 0.15s;" onmouseover="this.style.color='#85b7eb'" onmouseout="this.style.color='rgba(255,255,255,0.25)'">&#9993;</a>
            </div>
        `;
    }).join('');
}

function formatServerTime(isoStr) {
    // Extract time directly from ISO string to avoid browser timezone conversion
    // Format: 2026-03-13T23:07:27.571517-04:00
    if (!isoStr) return '';
    const match = isoStr.match(/T(\d{2}):(\d{2})/);
    if (!match) return '';
    let h = parseInt(match[1], 10);
    const m = match[2];
    const ampm = h >= 12 ? 'PM' : 'AM';
    if (h === 0) h = 12;
    else if (h > 12) h -= 12;
    return `${h}:${m} ${ampm}`;
}

function findProjectName(projectId) {
    if (!projectId) return '';
    const p = state.projects.find(p => p.id === projectId);
    return p?.name || '';
}

    const assumptions = a.assumptions || [];
    const da = data.drawing_analysis || {};
    const drawingsAnalyzed = da.drawings_analyzed || [];
    const durationSec = Math.round((data.processing_duration_ms || 0) / 1000);
    const opusCost = (data.input_tokens || 0) * 0.015 / 1000 + (data.output_tokens || 0) * 0.075 / 1000;
    const totalCost = opusCost + (data.drawing_cost || 0);
    const costEstimate = totalCost.toFixed(3);
    const costDetail = drawingsAnalyzed.length > 0 ? ` (includes ${drawingsAnalyzed.length} drawing analysis${drawingsAnalyzed.length > 1 ? 'es' : ''})` : '';

    const justifiedColor = a.justified ? '#5dcaa5' : '#f09595';

    const confColor = a.confidence === 'high' ? '#5dcaa5' : a.confidence === 'medium' ? '#fac775' : '#f09595';
    const evidenceColor = a.evidence_quality === 'strong' ? '#5dcaa5' : a.evidence_quality === 'moderate' ? '#fac775' : '#f09595';

let searchTimeout = null;
let searchActiveTypes = new Set(); // empty = all
let searchProjectId = '';
let searchStatus = '';
let searchFocusIdx = -1;
let searchProjectsList = [];

async function openSearch() {

    overlay.id = 'search-overlay';

    overlay.innerHTML = `
        <div class="search-modal">
            <div class="search-input-wrap">
                <span class="search-icon">&#128269;</span>
                <input class="search-input" id="search-input" type="text"
                    placeholder="Search RFIs, submittals, drawings, documents, contacts, intelligence..."
                    autocomplete="off" autofocus>
                <span class="search-hint">ESC</span>
            </div>
            <div class="search-filters" id="search-filters">
                <div class="search-chip chip-all active" data-type="all" onclick="toggleSearchChip(this)">All</div>
                <div class="search-chip chip-rfis" data-type="rfis" onclick="toggleSearchChip(this)">RFIs</div>
                <div class="search-chip chip-submittals" data-type="submittals" onclick="toggleSearchChip(this)">Submittals</div>
                <div class="search-chip chip-drawings" data-type="drawings" onclick="toggleSearchChip(this)">Drawings</div>
                <div class="search-chip chip-documents" data-type="documents" onclick="toggleSearchChip(this)">Documents</div>
                <div class="search-chip chip-contacts" data-type="contacts" onclick="toggleSearchChip(this)">Contacts</div>
                <div class="search-chip chip-intelligence" data-type="intelligence" onclick="toggleSearchChip(this)">Intelligence</div>
            </div>
            <div class="search-scope">
                <label>Scope:</label>
                <select id="search-project-select" onchange="searchProjectId=this.value; triggerSearch();">
                    <option value="">All projects</option>
                    ${projOptions}
                </select>
                <div class="scope-divider"></div>
                <label>Status:</label>
                <select id="search-status-select" onchange="searchStatus=this.value; triggerSearch();">
                    <option value="">Any status</option>
                    <option value="open">Open</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
            <div class="search-results" id="search-results">
                <div class="search-empty">
                    <div style="font-size:24px; margin-bottom:8px; opacity:0.4;">&#128269;</div>
                    Search across all projects — RFIs, submittals, drawings, documents, contacts, intelligence
                </div>
            </div>
            <div class="search-footer" id="search-footer" style="display:none;">
                <div class="search-footer-left" id="search-footer-left"></div>
                <div class="search-footer-right">&#8593;&#8595; navigate &nbsp; &#8629; open</div>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);

    searchActiveTypes = new Set();
    searchProjectId = '';
    searchStatus = '';
    searchFocusIdx = -1;

    const input = document.getElementById('search-input');
    input.focus();
    input.addEventListener('input', () => {
        clearTimeout(searchTimeout);
        const q = input.value.trim();
        if (q.length < 2) {
            document.getElementById('search-results').innerHTML = `
                <div class="search-empty">
                    <div style="font-size:24px; margin-bottom:8px; opacity:0.4;">&#128269;</div>
                    Search across all projects — RFIs, submittals, drawings, documents, contacts, intelligence
                </div>`;
            document.getElementById('search-footer').style.display = 'none';
            return;
        }
        document.getElementById('search-results').innerHTML = '<div class="search-loading"><div class="spinner" style="display:inline-block;margin-right:8px;"></div>Searching...</div>';
        searchTimeout = setTimeout(() => runSearch(q), 300);
    });

    document.addEventListener('keydown', searchKeyHandler);
}

function toggleSearchChip(el) {
    const type = el.dataset.type;
    if (type === 'all') {
        searchActiveTypes = new Set();
        document.querySelectorAll('.search-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
    } else {
        document.querySelector('.search-chip.chip-all').classList.remove('active');
        if (searchActiveTypes.has(type)) {
            searchActiveTypes.delete(type);
            el.classList.remove('active');
        } else {
            searchActiveTypes.add(type);
            el.classList.add('active');
        }
        // If none selected, re-activate "All"
        if (searchActiveTypes.size === 0) {
            document.querySelector('.search-chip.chip-all').classList.add('active');
        }
    }
    triggerSearch();
}

function triggerSearch() {
    const input = document.getElementById('search-input');
    if (!input) return;
    const q = input.value.trim();
    if (q.length < 2) return;
    clearTimeout(searchTimeout);
    document.getElementById('search-results').innerHTML = '<div class="search-loading"><div class="spinner" style="display:inline-block;margin-right:8px;"></div>Searching...</div>';
    searchTimeout = setTimeout(() => runSearch(q), 150);
}

function searchKeyHandler(e) {
    if (e.key === 'Escape') { closeSearch(); return; }
    const items = document.querySelectorAll('#search-results .search-result-item');
    if (!items.length) return;
    if (e.key === 'ArrowDown') {
        e.preventDefault();
        searchFocusIdx = Math.min(searchFocusIdx + 1, items.length - 1);
        items.forEach((it, i) => it.classList.toggle('sr-focused', i === searchFocusIdx));
        items[searchFocusIdx]?.scrollIntoView({block: 'nearest'});
    } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        searchFocusIdx = Math.max(searchFocusIdx - 1, 0);
        items.forEach((it, i) => it.classList.toggle('sr-focused', i === searchFocusIdx));
        items[searchFocusIdx]?.scrollIntoView({block: 'nearest'});
    } else if (e.key === 'Enter' && searchFocusIdx >= 0 && items[searchFocusIdx]) {
        e.preventDefault();
        items[searchFocusIdx].click();
    }
}

function closeSearch() {
    const overlay = document.getElementById('search-overlay');
    if (overlay) overlay.remove();
    document.removeEventListener('keydown', searchKeyHandler);
    searchFocusIdx = -1;
}

function highlightTerm(text, query) {
    if (!text || !query) return esc(text || '');
    const escaped = esc(text);
    const qEsc = esc(query);
    const re = new RegExp(`(${qEsc.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    return escaped.replace(re, '<span class="search-highlight">$1</span>');
}

async function runSearch(query) {
    let url = `/search?q=${encodeURIComponent(query)}&limit=10`;
    if (searchActiveTypes.size > 0) url += `&types=${[...searchActiveTypes].join(',')}`;
    if (searchProjectId) url += `&project_id=${encodeURIComponent(searchProjectId)}`;
    if (searchStatus) url += `&status=${encodeURIComponent(searchStatus)}`;

    const res = await api(url);
    const container = document.getElementById('search-results');
    const footer = document.getElementById('search-footer');
    if (!container) return;

    if (!res || res.total_results === 0) {
        container.innerHTML = `<div class="search-empty">No results found for '${esc(query)}'<div class="search-empty-sub">Try a different search term or adjust your filters</div></div>`;
        if (footer) footer.style.display = 'none';
        return;
    }

    const d = res.results;
    let html = '';
    searchFocusIdx = -1;

    // Render order per spec: RFIs, Drawings, Submittals, Documents, Contacts, Intelligence
    const groupOrder = [
        { key: 'rfis', label: 'RFIs', renderer: renderRfiResults },
        { key: 'drawings', label: 'Drawings', renderer: renderDrawingResults },
        { key: 'submittals', label: 'Submittals', renderer: renderSubmittalResults },
        { key: 'documents', label: 'Documents', renderer: renderDocumentResults },
        { key: 'contacts', label: 'Contacts', renderer: renderContactResults },
        { key: 'intelligence', label: 'Intelligence', renderer: renderIntelResults },
    ];

    for (const g of groupOrder) {
        const group = d[g.key];
        if (!group || group.results.length === 0) continue;
        const total = group.total_count;
        const items = group.results;
        const initShow = 3;
        html += `<div class="search-group-label">${g.label}<span class="search-group-count">${total} result${total !== 1 ? 's' : ''}</span></div>`;
        html += `<div class="search-group-items" data-group="${g.key}">`;
        items.forEach((item, idx) => {
            const hidden = idx >= initShow ? ' style="display:none" data-overflow="1"' : '';
            html += g.renderer(item, query, hidden);
        });
        html += '</div>';
        if (items.length > initShow) {
            const moreCount = Math.min(total, items.length) - initShow;
            html += `<div class="search-show-more" data-group="${g.key}" onclick="expandSearchGroup('${g.key}')">Show ${moreCount} more ${g.label.toLowerCase()}</div>`;
        }
    }

    container.innerHTML = html;

    // Footer
    if (footer) {
        footer.style.display = 'flex';
        const activeFilters = searchActiveTypes.size > 0 ? ` · Filtered: ${[...searchActiveTypes].join(', ')}` : ' across all projects';
        document.getElementById('search-footer-left').textContent = `${res.total_results} results${activeFilters}`;
    }
}

function expandSearchGroup(groupKey) {
    const groupEl = document.querySelector(`.search-group-items[data-group="${groupKey}"]`);
    if (groupEl) groupEl.querySelectorAll('[data-overflow]').forEach(el => { el.style.display = ''; el.removeAttribute('data-overflow'); });
    const moreEl = document.querySelector(`.search-show-more[data-group="${groupKey}"]`);
    if (moreEl) moreEl.remove();
}

function renderRfiResults(r, query, hidden) {
    const statusBadge = r.is_overdue ? '<span style="color:#f09595; font-size:10px; font-weight:600;">OVERDUE</span>' : esc(r.status || '');
    const click = r.procore_url ? `onclick="window.open('${esc(r.procore_url)}', '_blank')"` : '';
    return `<div class="search-result-item" ${click}${hidden}>
        <div class="sri-icon rfi">RFI</div>
        <div class="sri-body">
            <div class="sri-title">#${esc(r.number)} — ${highlightTerm(r.subject, query)}</div>
            <div class="sri-meta">${statusBadge}${r.due_date ? ' · Due ' + r.due_date : ''} · ${esc(r.project_name || '')}</div>
        </div>
    </div>`;
}

function renderSubmittalResults(s, query, hidden) {
    const click = s.procore_url ? `onclick="window.open('${esc(s.procore_url)}', '_blank')"` : '';
    return `<div class="search-result-item" ${click}${hidden}>
        <div class="sri-icon sub">SUB</div>
        <div class="sri-body">
            <div class="sri-title">#${esc(s.number)} — ${highlightTerm(s.title, query)}</div>
            <div class="sri-meta">${esc(s.status || '')} · ${esc(s.project_name || '')}</div>
        </div>
    </div>`;
}

function renderDrawingResults(dr, query, hidden) {
    const click = dr.procore_url ? `onclick="window.open('${esc(dr.procore_url)}', '_blank')"` : '';
    const disc = dr.discipline ? `<span class="search-discipline-badge">${esc(dr.discipline)}</span>` : '';
    const currentLabel = dr.is_current === false ? '<span class="search-superseded">superseded</span>' : 'current';
    const rev = dr.revision ? 'Rev ' + esc(dr.revision) : '';
    const meta = [rev, disc, currentLabel, esc(dr.project_name || '')].filter(Boolean).join(' · ');
    return `<div class="search-result-item" ${click}${hidden}>
        <div class="sri-icon drawing">DWG</div>
        <div class="sri-body">
            <div class="sri-title">${highlightTerm(dr.number, query)} — ${highlightTerm(dr.title || '', query)}</div>
            <div class="sri-meta">${meta}</div>
        </div>
    </div>`;
}

function renderDocumentResults(doc, query, hidden) {
    let click = '';
    if (doc.procore_url) {
        click = `onclick="window.open('${esc(doc.procore_url)}', '_blank')"`;
    } else if (doc.file_url) {
        // Use /view for emails (renders as HTML), /file for everything else
        const viewUrl = '/api/documents/' + esc(doc.id) + '/view';
        click = `onclick="window.open('${viewUrl}', '_blank')"`;
    } else {
        click = 'style="cursor:default; opacity:0.6"';
    }
    const meta = [doc.doc_type ? esc(doc.doc_type) : '', esc(doc.project_name || '')].filter(Boolean).join(' · ');
    const noFile = !doc.procore_url && !doc.file_url ? '<span style="font-size:10px;color:rgba(255,255,255,0.3);margin-left:6px;">metadata only</span>' : '';
    return `<div class="search-result-item" ${click}${hidden}>
        <div class="sri-icon doc">DOC</div>
        <div class="sri-body">
            <div class="sri-title">${highlightTerm(doc.title, query)}${noFile}</div>
            <div class="sri-meta">${meta}</div>
        </div>
    </div>`;
}

function renderContactResults(c, query, hidden) {
    const initials = esc((c.first_name || '')[0] || '') + esc((c.last_name || '')[0] || '');
    const email = c.email || '';
    const meta = [c.company_name ? esc(c.company_name) : '', email ? esc(email) : ''].filter(Boolean).join(' · ');
    const click = email ? `onclick="navigator.clipboard.writeText('${esc(email)}'); showToast('Email copied')" title="Click to copy email"` : 'style="cursor:default"';
    return `<div class="search-result-item" ${click}${hidden}>
        <div class="sri-icon contact">${initials}</div>
        <div class="sri-body">
            <div class="sri-title">${highlightTerm((c.first_name || '') + ' ' + (c.last_name || ''), query)}</div>
            <div class="sri-meta">${meta}</div>
        </div>
    </div>`;
}

function renderIntelResults(i, query, hidden) {
    const sevColors = {critical: '#f09595', high: '#fac775', medium: '#85b7eb', low: '#afa9ec'};
    const sevColor = sevColors[i.severity] || '#afa9ec';
    const sevBadge = `<span style="color:${sevColor}; font-weight:600;">${esc(i.severity || '')}</span>`;
    return `<div class="search-result-item" onclick="closeSearch(); selectProject('${i.project_id || ''}')"${hidden}>

            <div class="sri-meta">${sevBadge} · ${esc(i.status || '')} · ${esc(i.project_name || '')}</div>
        </div>
    </div>`;
}

    if (search.length >= 2) url += `&search=${encodeURIComponent(search)}`;

    const res = await api(url);
    if (!res) return;

    dbDrawings = dbOffset === 0 ? (res.drawings || []) : dbDrawings.concat(res.drawings || []);
    dbOffset += (res.drawings || []).length;

    const countEl = document.getElementById('db-count');
    if (countEl) countEl.textContent = `${res.total_count} drawing${res.total_count !== 1 ? 's' : ''}`;

    const moreEl = document.getElementById('db-load-more');
    if (moreEl) moreEl.style.display = res.has_more ? '' : 'none';

    renderDrawingList();
}

// =============================================================================
// DRAWING VIEWER — Zoom/Pan
// =============================================================================
let viewerScale = 1;
let viewerPanX = 0, viewerPanY = 0;
let viewerPanning = false;
let viewerLastX = 0, viewerLastY = 0;
let viewerImgW = 0, viewerImgH = 0;

function initDrawingViewer() {
    const img = document.getElementById('drawing-viewer-img');
    const wrap = document.getElementById('drawing-viewer-wrap');
    if (!img || !wrap) return;
    viewerImgW = img.naturalWidth;
    viewerImgH = img.naturalHeight;
    // Fit to width
    viewerScale = wrap.clientWidth / viewerImgW;
    viewerPanX = 0;
    viewerPanY = 0;
    applyViewerTransform();

    // Zoom
    wrap.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        const rect = wrap.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const newScale = Math.max(0.05, Math.min(5, viewerScale * factor));
        viewerPanX = cx - (cx - viewerPanX) * (newScale / viewerScale);
        viewerPanY = cy - (cy - viewerPanY) * (newScale / viewerScale);
        viewerScale = newScale;
        applyViewerTransform();
    }, { passive: false });

    // Prevent native drag on image (stops upload overlay from triggering during pan)
    img.addEventListener('dragstart', (e) => e.preventDefault());

    // Pan
    wrap.addEventListener('mousedown', (e) => {
        if (markupActive && markupTool !== 'hand') return;
        e.preventDefault();
        viewerPanning = true;
        viewerLastX = e.clientX;
        viewerLastY = e.clientY;
        wrap.style.cursor = 'grabbing';
    });
    wrap.addEventListener('mousemove', (e) => {
        if (!viewerPanning) return;
        viewerPanX += e.clientX - viewerLastX;
        viewerPanY += e.clientY - viewerLastY;
        viewerLastX = e.clientX;
        viewerLastY = e.clientY;
        applyViewerTransform();
    });
    wrap.addEventListener('mouseup', () => { viewerPanning = false; wrap.style.cursor = markupActive && markupTool !== 'hand' ? 'crosshair' : 'grab'; });
    wrap.addEventListener('mouseleave', () => { viewerPanning = false; });
}

function applyViewerTransform() {
    const inner = document.getElementById('drawing-viewer-inner');
    if (inner) inner.style.transform = `translate(${viewerPanX}px, ${viewerPanY}px) scale(${viewerScale})`;
}

async function renderVisibleMarkups(drawingId) {
    const overlay = document.getElementById('drawing-markups-overlay');
    if (!overlay) return;
    if (visibleMarkupIds.size === 0) { overlay.innerHTML = ''; return; }

    let svgContent = '';
    for (const mid of visibleMarkupIds) {
        const res = await api(`/drawings/${drawingId}/markups/${mid}`);
        const data = res?.data?.markup_data;
        if (!data) continue;
        const parsed = typeof data === 'string' ? JSON.parse(data) : data;
        for (const el of (parsed.elements || [])) {
            svgContent += markupElementToSvg(el);
        }
    }
    const img = document.getElementById('drawing-viewer-img');
    const w = img?.naturalWidth || 1000;
    const h = img?.naturalHeight || 1000;
    overlay.innerHTML = `<svg width="${w}" height="${h}" style="display:block;" xmlns="http://www.w3.org/2000/svg">
        <defs><marker id="ah" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0,10 3.5,0 7" fill="red"/></marker></defs>
        ${svgContent}
    </svg>`;
}

function markupElementToSvg(el) {
    if (el.type === 'freehand' && el.points?.length > 1) {
        return `<path d="M${el.points.map(p=>p.join(',')).join('L')}" stroke="${el.stroke||'red'}" stroke-width="${el.stroke_width||3}" fill="none" stroke-linecap="round"/>`;
    } else if (el.type === 'line') {
        return `<line x1="${el.x1}" y1="${el.y1}" x2="${el.x2}" y2="${el.y2}" stroke="${el.stroke||'red'}" stroke-width="${el.stroke_width||3}"/>`;
    } else if (el.type === 'arrow') {
        return `<line x1="${el.x1}" y1="${el.y1}" x2="${el.x2}" y2="${el.y2}" stroke="${el.stroke||'red'}" stroke-width="${el.stroke_width||3}" marker-end="url(#ah)"/>`;
    } else if (el.type === 'rectangle') {
        return `<rect x="${el.x}" y="${el.y}" width="${el.width}" height="${el.height}" stroke="${el.stroke||'red'}" stroke-width="${el.stroke_width||3}" fill="none"/>`;
    } else if (el.type === 'cloud') {
        return `<rect x="${el.x}" y="${el.y}" width="${el.width}" height="${el.height}" stroke="${el.stroke||'red'}" stroke-width="${el.stroke_width||3}" fill="none" rx="12" stroke-dasharray="12,6"/>`;
    } else if (el.type === 'circle') {
        return `<circle cx="${el.cx}" cy="${el.cy}" r="${el.r}" stroke="${el.stroke||'red'}" stroke-width="${el.stroke_width||3}" fill="none"/>`;
    } else if (el.type === 'text') {
        return `<text x="${el.x}" y="${el.y}" fill="${el.fill||el.stroke||'red'}" font-size="${el.font_size||24}" font-weight="${el.font_weight||'bold'}" font-family="Arial,sans-serif">${esc(el.content||'')}</text>`;
    }
    return '';
}

async function deleteMarkupEntry(markupId, drawingId) {
    if (!confirm('Delete this markup?')) return;
    await fetch(API_BASE + `/drawings/${drawingId}/markups/${markupId}`, { method: 'DELETE', credentials: 'same-origin' });
    visibleMarkupIds.delete(markupId);
    loadMarkupsList(drawingId);
    showToast('Markup deleted');
}

function handleDrawingDownload(e, drawingId, drawingData) {
    // If markups are visible (SVG overlay has content), export as PNG with overlay
    const overlay = document.getElementById('drawing-markups-overlay');
    const hasSvg = overlay && overlay.querySelector('svg') && overlay.querySelector('svg').children.length > 1;
    if (hasSvg || visibleMarkupIds.size > 0) {
        e.preventDefault();
        e.stopPropagation();
        exportMarkedUpDrawing(drawingId, drawingData);
        return false;
    }
    // Otherwise let the default PDF download happen
}

async function exportMarkedUpDrawing(drawingId, drawingData) {
    const img = document.getElementById('drawing-viewer-img');
    const overlay = document.getElementById('drawing-markups-overlay');
    if (!img) { showToast('No drawing loaded'); return; }

    showToast('Preparing download...');

    // Wait for image to be fully loaded
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    const ctx = canvas.getContext('2d');

    // Need to reload image without CORS restrictions for canvas export
    const tempImg = new Image();
    tempImg.crossOrigin = 'anonymous';
    tempImg.onload = () => {
        ctx.drawImage(tempImg, 0, 0, canvas.width, canvas.height);

        // Draw markup elements directly onto canvas (bypass SVG-to-image which can fail)
        ctx.strokeStyle = '#FF0000';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.font = 'bold 24px Arial';

        // Get all visible markup elements
        const allElements = [];
        for (const mid of visibleMarkupIds) {
            const cached = document.getElementById('drawing-markups-overlay')?.querySelector('svg');
            // We already have the elements in memory from renderVisibleMarkups
        }

        // Use the SVG content directly — render via data URI
        const svgEl = overlay?.querySelector('svg');
        if (svgEl) {
            const svgClone = svgEl.cloneNode(true);
            svgClone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            const svgData = new XMLSerializer().serializeToString(svgClone);
            const svgDataUri = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svgData)));
            const svgImg = new Image();
            svgImg.onload = () => {
                ctx.drawImage(svgImg, 0, 0);
                triggerCanvasDownload(canvas, drawingData);
            };
            svgImg.onerror = () => {
                // Fallback: download without markup overlay
                triggerCanvasDownload(canvas, drawingData);
            };
            svgImg.src = svgDataUri;
        } else {
            triggerCanvasDownload(canvas, drawingData);
        }
    };
    tempImg.onerror = () => {
        showToast('Failed to prepare download');
    };
    tempImg.src = img.src;
}

function triggerCanvasDownload(canvas, drawingData) {
    try {
        const link = document.createElement('a');
        link.download = `${drawingData?.number || 'drawing'}_markup_${new Date().toISOString().slice(0,10)}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        showToast('Download started');
    } catch (e) {
        showToast('Download failed — try right-click > Save As on the drawing');
    }
}

                <span style="width:1px;height:20px;background:rgba(255,255,255,0.15);margin:0 4px;"></span>
                ${['#FF0000','#0066FF','#00AA00','#000000','#FF8800'].map(c => `<span class="mt-color${c==='#FF0000'?' active':''}" data-color="${c}" onclick="setMarkupColor('${c}',this)" style="width:18px;height:18px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c==='#FF0000'?'#fff':'transparent'};display:inline-block;"></span>`).join('')}
                <span style="width:1px;height:20px;background:rgba(255,255,255,0.15);margin:0 4px;"></span>
                <button class="mt-btn" onclick="markupUndo()" title="Undo">&#8630;</button>
                <button class="mt-btn" onclick="saveMarkup()" title="Save" style="color:#5dcaa5;">&#128190;</button>
                <button class="mt-btn" onclick="exitMarkupMode()" title="Exit" style="color:#f09595;">&#10005;</button>
                <span style="flex:1;"></span>
                <span style="font-size:10px;color:#6B7280;" id="markup-status">Unsaved</span>
            </div>
            <div id="markup-canvas-wrap" style="position:absolute;transform-origin:0 0;">
                <img id="markup-img" src="${pngUrl}" style="display:block;max-width:none;" onload="initMarkupSvg()">
                <svg id="markup-svg" style="position:absolute;top:0;left:0;" xmlns="http://www.w3.org/2000/svg"></svg>
            </div>
        </div>
    `;
}

function initMarkupSvg() {
    const img = document.getElementById('markup-img');
    const svg = document.getElementById('markup-svg');
    const container = document.getElementById('markup-container');
    const wrap = document.getElementById('markup-canvas-wrap');
    if (!img || !svg || !container) return;

    svg.setAttribute('width', img.naturalWidth);
    svg.setAttribute('height', img.naturalHeight);
    svg.style.width = img.naturalWidth + 'px';
    svg.style.height = img.naturalHeight + 'px';
    markupSvg = svg;

    // Fit to width
    const toolbarH = document.getElementById('markup-toolbar')?.offsetHeight || 40;
    viewerScale = container.clientWidth / img.naturalWidth;
    viewerPanX = 0;
    viewerPanY = toolbarH;
    viewerImgW = img.naturalWidth;
    viewerImgH = img.naturalHeight;
    applyMarkupTransform();

    // Zoom (always works)
    container.addEventListener('wheel', (e) => {
        e.preventDefault();
        const factor = e.deltaY > 0 ? 0.9 : 1.1;
        const rect = container.getBoundingClientRect();
        const cx = e.clientX - rect.left;
        const cy = e.clientY - rect.top;
        const newScale = Math.max(0.05, Math.min(5, viewerScale * factor));
        viewerPanX = cx - (cx - viewerPanX) * (newScale / viewerScale);
        viewerPanY = cy - (cy - viewerPanY) * (newScale / viewerScale);
        viewerScale = newScale;
        applyMarkupTransform();
    }, { passive: false });

    // Pan (hand tool) and draw (other tools) via SVG
    svg.addEventListener('mousedown', (e) => {
        if (markupTool === 'hand') {
            viewerPanning = true;
            viewerLastX = e.clientX;
            viewerLastY = e.clientY;
            container.style.cursor = 'grabbing';
        } else {
            markupMouseDown(e);
        }
    });
    svg.addEventListener('mousemove', (e) => {
        if (viewerPanning) {
            viewerPanX += e.clientX - viewerLastX;
            viewerPanY += e.clientY - viewerLastY;
            viewerLastX = e.clientX;
            viewerLastY = e.clientY;
            applyMarkupTransform();
        } else {
            markupMouseMove(e);
        }
    });
    svg.addEventListener('mouseup', (e) => {
        if (viewerPanning) {
            viewerPanning = false;
            container.style.cursor = markupTool === 'hand' ? 'grab' : 'crosshair';
        } else {
            markupMouseUp(e);
        }
    });
    svg.addEventListener('mouseleave', (e) => {
        viewerPanning = false;
        markupMouseUp(e);
    });

    // Load existing markups
    loadExistingMarkups();
}

function applyMarkupTransform() {
    const wrap = document.getElementById('markup-canvas-wrap');
    if (wrap) wrap.style.transform = `translate(${viewerPanX}px, ${viewerPanY}px) scale(${viewerScale})`;
}

async function loadExistingMarkups() {
    const res = await api(`/drawings/${markupDrawingId}/markups`);
    const markups = res?.markups || [];

    // Show markup selector in toolbar
    const toolbar = document.getElementById('markup-toolbar');
    if (!toolbar) return;
    let selector = document.getElementById('markup-selector');
    if (!selector) {
        selector = document.createElement('span');
        selector.id = 'markup-selector';
        selector.style.cssText = 'margin-left:8px;';
        // Insert before the status span
        const status = document.getElementById('markup-status');
        if (status) status.before(selector);
    }

    if (markups.length > 0) {
        selector.innerHTML = `<select id="markup-select" onchange="loadMarkupById(this.value)" style="background:rgba(255,255,255,0.06);border:0.5px solid rgba(255,255,255,0.1);border-radius:4px;color:rgba(255,255,255,0.7);font-size:11px;padding:3px 6px;font-family:var(--font);">
            <option value="">New markup</option>
            ${markups.map(m => `<option value="${m.id}">${esc(m.title || 'Untitled')}</option>`).join('')}
        </select>`;
        // Don't auto-load — start with a clean canvas
        markupElements = [];
        renderMarkupElements();
        document.getElementById('markup-status').textContent = 'New markup';
    }
}

async function loadMarkupById(mid) {
    if (!mid) {
        // "New markup" selected — clear canvas
        markupId = null;
        markupElements = [];
        markupUndoStack = [];
        renderMarkupElements();
        document.getElementById('markup-status').textContent = 'New markup';
        return;
    }
    markupId = mid;
    const full = await api(`/drawings/${markupDrawingId}/markups/${mid}`);
    if (full?.data?.markup_data) {
        const data = typeof full.data.markup_data === 'string' ? JSON.parse(full.data.markup_data) : full.data.markup_data;
        markupElements = data.elements || [];
        markupUndoStack = [];
        renderMarkupElements();
        document.getElementById('markup-status').textContent = 'Loaded';
    }
}

function setMarkupTool(tool, btn) {
    markupTool = tool;
    document.querySelectorAll('.mt-btn[data-tool]').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
    else document.querySelector(`.mt-btn[data-tool="${tool}"]`)?.classList.add('active');
    const container = document.getElementById('markup-container');
    if (container) container.style.cursor = tool === 'hand' ? 'grab' : tool === 'text' ? 'text' : 'crosshair';
}

function setMarkupColor(color, el) {
    markupColor = color;
    document.querySelectorAll('.mt-color').forEach(c => c.style.borderColor = 'transparent');
    if (el) el.style.borderColor = '#fff';
}

function getSvgCoords(e) {
    const svg = markupSvg;
    const rect = svg.getBoundingClientRect();
    const scaleX = svg.getAttribute('width') / rect.width;
    const scaleY = svg.getAttribute('height') / rect.height;
    return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

function markupMouseDown(e) {
    markupDrawing = true;
    const p = getSvgCoords(e);
    markupStartX = p.x;
    markupStartY = p.y;

    if (markupTool === 'text') {
        const text = prompt('Enter text (will appear in uppercase):');
        if (text) {
            markupElements.push({
                type: 'text', id: 'e' + Date.now(), x: p.x, y: p.y,
                content: text.toUpperCase(), font_size: 24, fill: markupColor, font_weight: 'bold'
            });
            renderMarkupElements();
            markupUndoStack.push(markupElements.length - 1);
        }
        markupDrawing = false;
        return;
    }

    if (markupTool === 'pen') {
        markupCurrentPath = [[p.x, p.y]];
    }
}

function markupMouseMove(e) {
    if (!markupDrawing) return;
    const p = getSvgCoords(e);

    if (markupTool === 'pen') {
        markupCurrentPath.push([p.x, p.y]);
        // Draw temp freehand
        renderMarkupElements();
        if (markupCurrentPath.length > 1) {
            const pathData = 'M' + markupCurrentPath.map(pt => pt.join(',')).join('L');
            const temp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            temp.setAttribute('d', pathData);
            temp.setAttribute('stroke', markupColor);
            temp.setAttribute('stroke-width', '3');
            temp.setAttribute('fill', 'none');
            temp.setAttribute('stroke-linecap', 'round');
            markupSvg.appendChild(temp);
        }
        return;
    }

    // Preview for shapes
    renderMarkupElements();
    const dx = p.x - markupStartX, dy = p.y - markupStartY;
    if (markupTool === 'line' || markupTool === 'arrow') {
        const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
        line.setAttribute('x1', markupStartX); line.setAttribute('y1', markupStartY);
        line.setAttribute('x2', p.x); line.setAttribute('y2', p.y);
        line.setAttribute('stroke', markupColor); line.setAttribute('stroke-width', '3');
        if (markupTool === 'arrow') line.setAttribute('marker-end', 'url(#arrowhead)');
        markupSvg.appendChild(line);
    } else if (markupTool === 'rectangle' || markupTool === 'cloud') {
        const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
        rect.setAttribute('x', Math.min(markupStartX, p.x)); rect.setAttribute('y', Math.min(markupStartY, p.y));
        rect.setAttribute('width', Math.abs(dx)); rect.setAttribute('height', Math.abs(dy));
        rect.setAttribute('stroke', markupColor); rect.setAttribute('stroke-width', '3'); rect.setAttribute('fill', 'none');
        if (markupTool === 'cloud') { rect.setAttribute('stroke-dasharray', '8,4'); rect.setAttribute('rx', '10'); }
        markupSvg.appendChild(rect);
    } else if (markupTool === 'circle') {
        const circ = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circ.setAttribute('cx', markupStartX); circ.setAttribute('cy', markupStartY);
        circ.setAttribute('r', Math.sqrt(dx*dx + dy*dy));
        circ.setAttribute('stroke', markupColor); circ.setAttribute('stroke-width', '3'); circ.setAttribute('fill', 'none');
        markupSvg.appendChild(circ);
    }
}

function markupMouseUp(e) {
    if (!markupDrawing) return;
    markupDrawing = false;
    const p = getSvgCoords(e);
    const dx = p.x - markupStartX, dy = p.y - markupStartY;

    if (markupTool === 'pen' && markupCurrentPath.length > 2) {
        markupElements.push({ type: 'freehand', id: 'e' + Date.now(), points: markupCurrentPath, stroke: markupColor, stroke_width: 3 });
        markupUndoStack.push(markupElements.length - 1);
    } else if (markupTool === 'line') {
        markupElements.push({ type: 'line', id: 'e' + Date.now(), x1: markupStartX, y1: markupStartY, x2: p.x, y2: p.y, stroke: markupColor, stroke_width: 3 });
        markupUndoStack.push(markupElements.length - 1);
    } else if (markupTool === 'arrow') {
        markupElements.push({ type: 'arrow', id: 'e' + Date.now(), x1: markupStartX, y1: markupStartY, x2: p.x, y2: p.y, stroke: markupColor, stroke_width: 3 });
        markupUndoStack.push(markupElements.length - 1);
    } else if (markupTool === 'rectangle') {
        markupElements.push({ type: 'rectangle', id: 'e' + Date.now(), x: Math.min(markupStartX, p.x), y: Math.min(markupStartY, p.y), width: Math.abs(dx), height: Math.abs(dy), stroke: markupColor, stroke_width: 3, fill: 'none' });
        markupUndoStack.push(markupElements.length - 1);
    } else if (markupTool === 'cloud') {
        markupElements.push({ type: 'cloud', id: 'e' + Date.now(), x: Math.min(markupStartX, p.x), y: Math.min(markupStartY, p.y), width: Math.abs(dx), height: Math.abs(dy), stroke: markupColor, stroke_width: 3, fill: 'none' });
        markupUndoStack.push(markupElements.length - 1);
    } else if (markupTool === 'circle') {
        markupElements.push({ type: 'circle', id: 'e' + Date.now(), cx: markupStartX, cy: markupStartY, r: Math.sqrt(dx*dx + dy*dy), stroke: markupColor, stroke_width: 3, fill: 'none' });
        markupUndoStack.push(markupElements.length - 1);
    }

    markupCurrentPath = [];
    renderMarkupElements();
    document.getElementById('markup-status').textContent = 'Unsaved changes';
}

function renderMarkupElements() {
    if (!markupSvg) return;
    // Keep SVG dimensions, clear content
    const w = markupSvg.getAttribute('width');
    const h = markupSvg.getAttribute('height');
    markupSvg.innerHTML = `<defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="${markupColor}"/></marker></defs>`;

    for (const el of markupElements) {
        let svgEl;
        if (el.type === 'freehand' && el.points?.length > 1) {
            svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            svgEl.setAttribute('d', 'M' + el.points.map(p => p.join(',')).join('L'));
            svgEl.setAttribute('stroke', el.stroke); svgEl.setAttribute('stroke-width', el.stroke_width || 3);
            svgEl.setAttribute('fill', 'none'); svgEl.setAttribute('stroke-linecap', 'round');
        } else if (el.type === 'line') {
            svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            svgEl.setAttribute('x1', el.x1); svgEl.setAttribute('y1', el.y1);
            svgEl.setAttribute('x2', el.x2); svgEl.setAttribute('y2', el.y2);
            svgEl.setAttribute('stroke', el.stroke); svgEl.setAttribute('stroke-width', el.stroke_width || 3);
        } else if (el.type === 'arrow') {
            svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            svgEl.setAttribute('x1', el.x1); svgEl.setAttribute('y1', el.y1);
            svgEl.setAttribute('x2', el.x2); svgEl.setAttribute('y2', el.y2);
            svgEl.setAttribute('stroke', el.stroke); svgEl.setAttribute('stroke-width', el.stroke_width || 3);
            svgEl.setAttribute('marker-end', 'url(#arrowhead)');
        } else if (el.type === 'rectangle') {
            svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            svgEl.setAttribute('x', el.x); svgEl.setAttribute('y', el.y);
            svgEl.setAttribute('width', el.width); svgEl.setAttribute('height', el.height);
            svgEl.setAttribute('stroke', el.stroke); svgEl.setAttribute('stroke-width', el.stroke_width || 3);
            svgEl.setAttribute('fill', el.fill || 'none');
        } else if (el.type === 'cloud') {
            // Revision cloud — rect with wavy border
            svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            svgEl.setAttribute('x', el.x); svgEl.setAttribute('y', el.y);
            svgEl.setAttribute('width', el.width); svgEl.setAttribute('height', el.height);
            svgEl.setAttribute('stroke', el.stroke); svgEl.setAttribute('stroke-width', el.stroke_width || 3);
            svgEl.setAttribute('fill', 'none'); svgEl.setAttribute('rx', '12');
            svgEl.setAttribute('stroke-dasharray', '12,6');
        } else if (el.type === 'circle') {
            svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            svgEl.setAttribute('cx', el.cx); svgEl.setAttribute('cy', el.cy); svgEl.setAttribute('r', el.r);
            svgEl.setAttribute('stroke', el.stroke); svgEl.setAttribute('stroke-width', el.stroke_width || 3);
            svgEl.setAttribute('fill', el.fill || 'none');
        } else if (el.type === 'text') {
            svgEl = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            svgEl.setAttribute('x', el.x); svgEl.setAttribute('y', el.y);
            svgEl.setAttribute('fill', el.fill || el.stroke || '#FF0000');
            svgEl.setAttribute('font-size', el.font_size || 24);
            svgEl.setAttribute('font-weight', el.font_weight || 'bold');
            svgEl.setAttribute('font-family', 'Arial, sans-serif');
            svgEl.textContent = el.content || '';
        }
        if (svgEl) markupSvg.appendChild(svgEl);
    }
}

function markupUndo() {
    if (markupUndoStack.length === 0) return;
    const idx = markupUndoStack.pop();
    markupElements.splice(idx, 1);
    renderMarkupElements();
    document.getElementById('markup-status').textContent = 'Unsaved changes';
}

async function saveMarkup() {
    const img = document.getElementById('markup-img');
    const data = {
        page_width: img?.naturalWidth || 0,
        page_height: img?.naturalHeight || 0,
        elements: markupElements,
    };

    if (markupId) {
        await fetch(API_BASE + `/drawings/${markupDrawingId}/markups/${markupId}`, {
            method: 'PUT', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ markup_data: data }), credentials: 'same-origin',
        });
    } else {
        const title = prompt('Name this markup:', 'Field markup ' + new Date().toLocaleDateString()) || 'Untitled';
        const res = await fetch(API_BASE + `/drawings/${markupDrawingId}/markups`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ title, markup_data: data, page_number: 1 }), credentials: 'same-origin',
        });
        const resData = await res.json();
        markupId = resData?.data?.id;
    }

    document.getElementById('markup-status').textContent = 'Saved';
    showToast('Markup saved');
}

function exitMarkupMode() {
    if (markupElements.length > 0 && document.getElementById('markup-status')?.textContent === 'Unsaved changes') {
        if (!confirm('You have unsaved changes. Exit markup mode?')) return;
    }
    markupActive = false;
    // Re-render the PDF viewer
    if (dbSelectedId) selectDrawing(dbSelectedId);
}

// Forward sidebar scroll to main content
document.addEventListener('wheel', (e) => {
    const sidebar = e.target.closest('.nav-rail, .radar-sidebar');
    if (sidebar) {
        const main = document.querySelector('.main-scroll');
        if (main) main.scrollTop += e.deltaY;
    }
}, { passive: true });

// Markup escape → hand tool
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && markupActive && markupTool !== 'hand') {
        setMarkupTool('hand');
        return;
    }
});

// Drawing Browser keyboard navigation
document.addEventListener('keydown', (e) => {
    const browser = document.getElementById('drawing-browser');
    if (!browser || browser.querySelector('.db-body.collapsed')) return;
    // Don't capture when typing in inputs
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
        if (e.key === 'Escape') { e.target.blur(); return; }
        return;
    }
    // Only handle if drawing browser is visible (dashboard view)
    if (state.view !== 'dashboard') return;

    if (e.key === 'ArrowDown' && dbDrawings.length > 0) {
        e.preventDefault();
        dbSelectedIdx = Math.min(dbSelectedIdx + 1, dbDrawings.length - 1);
        selectDrawing(dbDrawings[dbSelectedIdx].id);
    } else if (e.key === 'ArrowUp' && dbDrawings.length > 0) {
        e.preventDefault();
        dbSelectedIdx = Math.max(dbSelectedIdx - 1, 0);
        selectDrawing(dbDrawings[dbSelectedIdx].id);
    } else if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        document.getElementById('db-search')?.focus();
    } else if (e.key === 'f' && dbSelectedId) {
        toggleFavorite(dbSelectedId);
    }
});

let uploadFiles = [];
let uploadProjectId = '';
let uploadProjectName = '';
let uploadClassification = '';

function openUploadModal(projectId, projectName) {
    uploadFiles = [];
    uploadProjectId = projectId || '';
    uploadProjectName = projectName || '';
    uploadClassification = '';

    const overlay = document.createElement('div');
    overlay.className = 'search-overlay';
    overlay.id = 'upload-overlay';
    overlay.onclick = (e) => { if (e.target === overlay) closeUploadModal(); };

    const needsProjectPicker = !uploadProjectId;
    const projectPickerHtml = needsProjectPicker ? `
        <div class="upload-project-picker" id="upload-project-picker">
            <div class="upp-label">Select project (required)</div>
            <div id="upload-project-chips">${state.projects.map(p => `
                <span class="upload-project-chip" data-id="${p.id}" data-name="${esc(p.name)}" onclick="selectUploadProject(this)">${esc(p.name)}</span>
            `).join('')}</div>
        </div>
    ` : '';

    overlay.innerHTML = `
        <div class="upload-modal">
            <div class="upload-header">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <h3>Upload document</h3>
                    <span style="font-size:11px;color:var(--text-muted);cursor:pointer;" onclick="closeUploadModal()">ESC</span>
                </div>
                ${uploadProjectName ? `<div class="upload-sub">${esc(uploadProjectName)}</div>` : ''}
            </div>
            ${projectPickerHtml}
            <div class="upload-dropzone" id="upload-dropzone"
                 onclick="document.getElementById('upload-file-input').click()">
                <div class="dz-icon">&#128228;</div>
                <div class="dz-text">Drag files here or click to browse</div>
                <div class="dz-sub">PDF, DOCX, XLSX, DWG, DXF, images · Max 50 MB per file</div>
            </div>
            <input type="file" id="upload-file-input" multiple accept=".pdf,.docx,.xlsx,.dwg,.dxf,.png,.jpg,.jpeg,.tiff,.csv,.eml,.msg" style="display:none" onchange="handleUploadFiles(this.files)">
            <div id="upload-file-list"></div>

            <div class="upload-section-label">Classification (optional — system will auto-detect)</div>
            <div class="upload-chips" id="upload-class-chips">
                ${['Drawing','Specification','Submittal','Correspondence','Schedule','Other'].map(c => `
                    <div class="upload-chip" data-val="${c.toLowerCase()}" onclick="toggleUploadClass(this)">${c}</div>
                `).join('')}
            </div>

            <div class="upload-section-label">Notes (optional)</div>
            <textarea class="upload-notes" id="upload-notes" placeholder="e.g., Updated lobby ceiling from architect — replaces Rev 1 from Feb"></textarea>

            <div class="upload-scope">
                <label>Source:</label>
                <select id="upload-source">
                    <option value="">Not specified</option>
                    <option value="architect">Architect</option>
                    <option value="owner">Owner</option>
                    <option value="subcontractor">Subcontractor</option>
                    <option value="consultant">Consultant</option>
                    <option value="internal">Internal</option>
                    <option value="other">Other</option>
                </select>
                <div class="scope-divider"></div>
                <label>Priority:</label>
                <select id="upload-priority">
                    <option value="normal">Normal</option>
                    <option value="high">High</option>
                </select>
            </div>

            <div class="upload-footer">
                <div class="upload-footer-hint">File enters the intelligence pipeline after upload</div>
                <div class="upload-footer-actions">
                    <button class="upload-btn-cancel" onclick="closeUploadModal()">Cancel</button>
                    <button class="upload-btn-submit" id="upload-submit-btn" disabled onclick="submitUpload()">Upload & process</button>
                </div>
            </div>
        </div>
    `;
    document.body.appendChild(overlay);

    // Dropzone drag events
    const dz = document.getElementById('upload-dropzone');
    dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('dragover'); });
    dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
    dz.addEventListener('drop', (e) => { e.preventDefault(); dz.classList.remove('dragover'); handleUploadFiles(e.dataTransfer.files); });

    document.addEventListener('keydown', uploadKeyHandler);
}

function uploadKeyHandler(e) { if (e.key === 'Escape') closeUploadModal(); }

function closeUploadModal() {
    const overlay = document.getElementById('upload-overlay');
    if (overlay) overlay.remove();
    document.removeEventListener('keydown', uploadKeyHandler);
}

function selectUploadProject(el) {
    document.querySelectorAll('.upload-project-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    uploadProjectId = el.dataset.id;
    uploadProjectName = el.dataset.name;
    updateUploadSubmitState();
}

function toggleUploadClass(el) {
    const wasActive = el.classList.contains('active');
    document.querySelectorAll('#upload-class-chips .upload-chip').forEach(c => c.classList.remove('active'));
    if (!wasActive) {
        el.classList.add('active');
        uploadClassification = el.dataset.val;
    } else {
        uploadClassification = '';
    }
}

function handleUploadFiles(fileList) {
    const allowed = ['.pdf','.docx','.xlsx','.dwg','.dxf','.png','.jpg','.jpeg','.tiff','.csv','.eml','.msg'];
    for (const f of fileList) {
        const ext = '.' + f.name.split('.').pop().toLowerCase();
        if (!allowed.includes(ext)) {
            showToast(`Unsupported file type: ${ext}`);
            continue;
        }
        if (f.size > 50 * 1024 * 1024) {
            showToast(`File too large: ${f.name} (${Math.round(f.size/1024/1024)}MB)`);
            continue;
        }
        uploadFiles.push({ file: f, status: 'ready' });
    }
    renderUploadFileList();
    updateUploadSubmitState();
}

function removeUploadFile(idx) {
    uploadFiles.splice(idx, 1);
    renderUploadFileList();
    updateUploadSubmitState();
}

function renderUploadFileList() {
    const container = document.getElementById('upload-file-list');
    if (!container) return;
    const badgeColors = {
        pdf: ['#f09595','rgba(232,78,78,0.2)'], docx: ['#5dcaa5','rgba(93,202,165,0.2)'],
        xlsx: ['#5dcaa5','rgba(93,202,165,0.2)'], dwg: ['#85b7eb','rgba(55,138,221,0.2)'],
        dxf: ['#85b7eb','rgba(55,138,221,0.2)'], png: ['#fac775','rgba(250,199,117,0.2)'],
        jpg: ['#fac775','rgba(250,199,117,0.2)'], jpeg: ['#fac775','rgba(250,199,117,0.2)'],
        tiff: ['#fac775','rgba(250,199,117,0.2)'], csv: ['#afa9ec','rgba(127,119,221,0.2)'],
        eml: ['#ed93b1','rgba(212,83,126,0.2)'], msg: ['#ed93b1','rgba(212,83,126,0.2)'],
    };
    container.innerHTML = uploadFiles.map((uf, i) => {
        const ext = uf.file.name.split('.').pop().toLowerCase();
        const [color, bg] = badgeColors[ext] || ['#afa9ec','rgba(127,119,221,0.2)'];
        const sizeStr = uf.file.size < 1048576 ? Math.round(uf.file.size/1024) + 'KB' : (uf.file.size/1048576).toFixed(1) + 'MB';
        const statusClass = uf.status === 'error' ? ' error' : '';
        const statusText = uf.status === 'ready' ? 'Ready' : uf.status === 'uploading' ? 'Uploading...' : uf.status === 'done' ? 'Uploaded' : 'Failed';
        return `<div class="upload-file-card">
            <span class="ufc-badge" style="background:${bg};color:${color};">${esc(ext.toUpperCase())}</span>
            <div class="ufc-info">
                <div class="ufc-name">${esc(uf.file.name)}</div>
                <div class="ufc-size">${sizeStr}</div>
            </div>
            <span class="ufc-status${statusClass}">${statusText}</span>
            ${uf.status === 'ready' ? `<button class="ufc-remove" onclick="removeUploadFile(${i})">&times;</button>` : ''}
        </div>`;
    }).join('');
}

function updateUploadSubmitState() {
    const btn = document.getElementById('upload-submit-btn');
    if (btn) btn.disabled = uploadFiles.length === 0 || !uploadProjectId;
}

async function submitUpload() {
    const btn = document.getElementById('upload-submit-btn');
    if (btn) { btn.disabled = true; btn.textContent = 'Uploading...'; }

    const notes = document.getElementById('upload-notes')?.value || '';
    const source = document.getElementById('upload-source')?.value || '';
    const priority = document.getElementById('upload-priority')?.value || 'normal';
    let successCount = 0;

    for (let i = 0; i < uploadFiles.length; i++) {
        const uf = uploadFiles[i];
        if (uf.status === 'done') continue;
        uf.status = 'uploading';
        renderUploadFileList();

        const formData = new FormData();
        formData.append('file', uf.file);
        formData.append('project_id', uploadProjectId);
        if (uploadClassification) formData.append('classification', uploadClassification);
        if (notes) formData.append('notes', notes);
        if (source) formData.append('source', source);
        formData.append('priority', priority);
        formData.append('uploaded_by', 'command-center');

        try {
            const res = await fetch('/api/documents/upload', { method: 'POST', body: formData, credentials: 'same-origin' });
            if (res.ok) {
                uf.status = 'done';
                successCount++;
            } else {
                const err = await res.json().catch(() => ({}));
                uf.status = 'error';
                uf.errorMsg = err.detail || 'Upload failed';
            }
        } catch (e) {
            uf.status = 'error';
            uf.errorMsg = 'Network error';
        }
        renderUploadFileList();
    }

    if (successCount > 0) {
        showToast(`${successCount} document${successCount > 1 ? 's' : ''} uploaded to ${uploadProjectName} — processing started`);
        setTimeout(() => closeUploadModal(), 800);
    } else {
        if (btn) { btn.disabled = false; btn.textContent = 'Upload & process'; }
    }
}

// Page-level drag-and-drop
let dragCounter = 0;
document.addEventListener('dragenter', (e) => {
    e.preventDefault();
    // Only show upload overlay for file drags from OS, not internal element drags
    if (!e.dataTransfer || !e.dataTransfer.types.includes('Files')) return;
    dragCounter++;
    if (dragCounter === 1 && !document.getElementById('upload-overlay')) {
        const overlay = document.createElement('div');
        overlay.className = 'drag-overlay';
        overlay.id = 'drag-page-overlay';
        const projName = state.view === 'project' && state.selectedProjectId
            ? (state.projects.find(p => p.id === state.selectedProjectId)?.name || 'this project')
            : '';
        overlay.textContent = projName ? `Drop files to upload to ${projName}` : 'Drop files — select a project to upload';
        document.body.appendChild(overlay);
    }
});
document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; const o = document.getElementById('drag-page-overlay'); if (o) o.remove(); }
});
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
    e.preventDefault();
    dragCounter = 0;
    const o = document.getElementById('drag-page-overlay');
    if (o) o.remove();
    if (document.getElementById('upload-overlay')) return; // modal already open
    if (e.dataTransfer.files.length > 0) {
        const proj = state.view === 'project' && state.selectedProjectId
            ? state.projects.find(p => p.id === state.selectedProjectId)
            : null;
        openUploadModal(proj?.id || '', proj?.name || '');
        setTimeout(() => handleUploadFiles(e.dataTransfer.files), 100);
    }
});

function showToast(msg) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

// =============================================================================
// INIT
// =============================================================================
async function init() {
    // Set topbar date/time
    updateTopbarDateTime();
    setInterval(updateTopbarDateTime, 60000);

    // Parse URL to restore view state
    const path = window.location.pathname;
    const projectMatch = path.match(/\/project\/([^/]+)/);
    if (projectMatch) {
        state.view = 'project';
        state.selectedProjectId = projectMatch[1];
    } else if (path.includes('/radar')) {
        state.view = 'radar';
    } else {
        state.view = 'dashboard';
    }

    // Handle browser back/forward
    window.addEventListener('popstate', (e) => {
        if (e.state) {
            navigate(e.state.view || 'dashboard', e.state.projectId, true);
        } else {
            navigate('dashboard', null, true);
        }
    });

    // Load sidebar first
    await loadSidebar();
    // Render current view (from URL or dashboard)
    await render();
    // Refresh sidebar with health data now that dashboard is loaded
    await loadSidebar();

    // Update sync indicator
    const healthRes = await api('/health');
    const syncDot = document.getElementById('sync-dot');
    if (healthRes?.status === 'healthy') {
        syncDot.style.background = 'var(--accent-green)';
    } else {
        syncDot.style.background = 'var(--accent-red)';
    }

    // Auto-refresh activity feed every 30 seconds when on dashboard
    setInterval(() => {
        if (state.view === 'dashboard') loadActivityFeed();
    }, 30000);
}

function updateTopbarDateTime() {
    const el = document.getElementById('topbar-datetime');
    if (!el) return;
    const now = new Date();
    const dateStr = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
    const timeStr = now.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    el.innerHTML = `${dateStr}<br><span style="font-size:11px;">${timeStr}</span>`;
    el.style.textAlign = 'right';
    el.style.lineHeight = '1.3';
}

init();
</script>
